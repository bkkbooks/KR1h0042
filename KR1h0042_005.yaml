body:
  text: 跋余祖文忠公正色立朝敦尙氣節爲有宋名臣著書垂教卷帙宏富其見於宋藝文志者尙書詳說五十卷中庸說一卷大學說一卷孝經解四卷論語解十卷鄕黨少儀咸有一德論孟子拾遺共一卷心傳錄十二卷語錄十四卷見於郡齋讀書志者孟子解三十六卷唐鱠五十卷見於直齋書錄解題者論語拾遺一卷言行編遺文共一卷見於玉海者重修神宗實錄二百卷見於家傳者經筵講義一卷橫浦家集二十卷雜見他書者書傳統論六卷春秋講義一卷標注國語類編及唐詩該無卷數其書名卷數微異者不複舉今四庫著錄惟孟子傳殘本二十九卷橫浦集二十卷其鄕黨少儀咸有一德論孟子拾遺心傳錄書傳統論春秋講義卽附載橫浦集中其他均不傳日本澀江全善經籍訪古志有宋槧中庸說六卷藏普門院余求之有年不知其所在歲戊辰東渡故人内藤湖南語余院在京都東福寺旣覩其書已佚後半請於寺僧攝影攜歸才四十葉耳曩讀朱文公集謂公以佛語釋儒書駁斥是書者殆及萬言其徵引原文均合蓋此卽朱子所見之本公之爲學於喜怒哀樂未發之前求其内心有得勿止更求其發而中節之用其途徑與朱子容有不同孰是孰非非余所敢議余獨痛夫儒釋之辨盛於當日公之學說爲朱子所抨擊致湮沒而不彰是書亦自宋迄今無復刊行余旣得諸海外因覆印以餉今之學者且冀其因有異同而得並存焉則幸甚矣民國紀元二十有五年丙子四月裔孫元濟謹識

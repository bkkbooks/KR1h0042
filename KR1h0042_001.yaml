front:
  text: 中庸説卷第一
  hash: sha256:f0b048567a6d3b41d8b3f0903fc714a410119d79ddd495ff1d50f3abd2037289
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0042_SBCK_001-1a}
body:
  text: 無垢先生范陽張九成中庸説喜怒哀樂未發謂之中發而皆中節謂之和和即庸也變和為庸以言天下之定理不可易也此一篇子思所聞於曽子聖道之尤粹者也學者不可以不思天命之謂性率性之謂道修道之謂教性道教三者之難名也久矣子思傳曽子之道以其所踐履而自得者為天下後丗別白而言之使學者知所適從焉其有功於名教也大矣天命之謂性此指性之本體而言也率性之謂道此指人之求道而言也修道之謂教此指道之運用而言也天命之謂性第贊性之可貴耳未見人收之為己物也率性之謂道則人體之為己物而入於仁義禮智中矣然而未見其設施運用也修道之謂教則仁行於父子義行於君臣禮行於賔主智行於賢者而道之等降隆殺於是而見焉中庸之名立於此三者矣天命之謂性喜怒哀樂未發以前者也所以謂之中率性之謂道此戒愼恐懼於不睹不聞以養喜怒哀樂未發以前之理此所以求中也至於修道之謂教則以天命之性率性之道而見於用發而皆中節矣所以謂之庸也子思立此三句非見入深微學臻聖地其能為此言乎盛矣哉道也者不可須臾離也可離非道也此言道之所以為道也夫率性之謂道則舍性而求道皆非所謂道也是則君子之求道豈可須臾舍性而求哉戒愼不睹恐懼不聞可也使其不睹不聞處微有私意間之則非性之本位而墮於人欲矣人欲豈道也哉故曰可離非道也蓋當其離處即是非道此率性所以謂之道是故君子戒愼乎其所不睹恐懼乎其所不聞莫見乎隱莫顯乎微故君子愼其獨也此指以率性之路不可須臾離之義也惟性不可須臾離故於不睹不聞處每致意焉夫戒愼乎其所不睹恐懼乎其所不聞况於稠人廣衆合堂同席之間其有不戒愼恐懼者乎此正合內外之道不可須臾離之本也夫不睹不聞少致其忽冝若無害矣然而怠忽之心巳顯見于心目之間昭昭乎不可掩也其精神所發道理所形亦必有非心邪氣雜於其間不足以感人動物而招非意之辱求莫為之禍焉此君子所以愼其獨也誠諸中形諸外不可掩如此嗚呼其可忽哉惟一意戒愼恐懼以養喜怒哀樂未發以前之理此善求中之道也喜怒哀樂之未發謂之中發而皆中節謂之和中也者天下之大本也和也者天下之逹道也致中和天地位焉萬物育焉中衍天命之義和衍修道之義喜怒哀樂之未發此指言性也故謂之中發而皆中節此所謂發也故謂之和中指性言故為大本和指教言故為逹道未發以前戒愼恐懼無一毫私欲巳發之後人倫之序無一毫差失此天地萬物之宗也所以言天地位於此萬物育於此嗚呼天地萬物皆在吾中和中則中和之用亦大矣學者不可不勉仲尼曰君子中庸小人反中庸君子之中庸也君子而時中小人之中庸也小人而無忌憚也天命之謂性此所謂中也率性之謂道此所以養中也修道之謂教此所謂庸也當喜怒哀樂未發以前君子戒愼恐懼此率性也及喜怒哀樂巳發之後君子行人倫之序此修道也夫方當率性時戒愼恐懼於不睹不聞處此學者之事也及其深入性之本原直造所謂天命者在我然後為君臣父子兄弟夫婦之教以幸於天下至於此時聖人之功用興矣此所以謂之中庸也然而君子小人名雖不同豈無喜怒哀樂乎喜怒哀樂未發時君子則恐懼戒愼以率之小人則何所不至哉豈知所謂率也喜怒哀樂巳發時君子則出為君臣父子兄弟之教小人則入於放辟邪侈矣豈知所謂修也謂小人無中庸之本則不可謂小人能行中庸又不可此不可不辨也然而喜怒哀樂巳發之後則謂之和和何自而來哉自中而巳矣中既為和則不得謂之中矣不謂之中而謂之和似於潛養之功為弗著也故謂之時中以言和自中來也時中即和也蓋中不可執一也以時而巳矣如時可以仕則仕為中時可以止則止為中可以速可以久皆以時而為中中不可執一也如此且合天下而論之則洛為中自燕而望洛則燕自有中也而洛為偏矣自越而望洛則越自有中也而洛亦為偏矣故處天下時則當以洛為中至於處燕越之地各中其所謂中可也豈可以執一哉此所以謂之時中也小人樂聞時中之説乃同乎荒俗合乎汚丗時尚縱橫吾為蘇張時尚虛無吾為衍晏此竊時中之名而略無忌憚者也此所以為小人也然則君子之學其可不愼乎夫率性之謂道既謂之率則是已發矣安得謂之中也曰率之為言以見無須臾離也既未離本位惡得謂之發乎誠如是説修道豈巳離性而為之哉曰吾嘗言之矣率性之謂道此學者之事也至於聖人則自率性直造天命之本於是有乾坤造化制為人倫之序以幸天下此所謂和也所謂天下之大本逹道所謂天地位萬物育所以成中庸之名也此不可以離不離名之也其理微矣不可不致思焉子曰中庸其至矣乎民鮮能久矣戒愼恐懼以養其中人倫之序以宣其和惟聖人能終始之至於尋常之人一息之暫且不能安而况久乎夫天地位於此萬物育於此中庸之為至德可不言而喻也子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也人莫不飲食也鮮能知味也戒愼不睹恐懼不聞以飬其中則發而中節必為人倫之序以宣其和此中庸之本也然知者知之太過而愚者又不及知焉既巳知之太過與夫不及知其能行乎此道之所以不行也賢者行之太過而不肖者又不及行焉既行之太過與夫不及行此道之所以卒不明也夫戒愼不睹恐懼不聞此養中之法也太過於此則失養中之法不及乎此安知養中之法君子欲求中庸要當於戒愼不睹恐懼不聞中得味則識中之本矣若夫不能守此法而用意過當與夫一出一入而欲求中是猶終日飲食而不知味也味乎味乎當優遊涵泳於不睹不聞時可也子曰道其不行矣夫子曰舜其大知也與舜好問而好察邇言隱惡而揚善執其兩端用其中於民其斯以為舜乎知者過之愚者不及賢者過之不肖者又不及審如是道其不行矣夫豈有是理哉自有行之者矣行之者其誰耶大舜而巳矣舜所以為大知者以知戒愼不睹恐懼不聞以養其中而無過不及也夫戒謹不睹恐懼不聞其所以為養中者乃在心術之內也至於形之於外則變為好問好察邇言隱惡揚善矣嘗試遡好問好察邇言隱惡揚善之心而上之即戒愼不睹恐懼不聞之心也戒愼恐懼以養此中則無過不及之端好問而好察邇言隱惡而揚善此中則亦無過不及矣執過不及之端而用其中於民則民皆知戒愼不睹恐懼不聞其形之於外則亦盡人之情也好問好察邇言隱惡揚善而不敢忽矣舜之所以為知者以能用戒愼恐懼之心變而為好問好察邇言隱惡揚善之實也夫好問好察邇言則盡人之情不敢斷以己意隱惡揚善則惡念消亡善端融泄其戒愼恐懼可知矣此所以能盡中庸之道也學者欲識中庸當於舜觀之子曰人皆曰豫知驅而納諸罟擭陷阱之中而莫之知辟也人皆曰豫知擇乎中庸而不能期月守也人皆用知於詮品是非而不知用知於戒愼恐懼人皆用知於機巧術數而不知用知於喜怒哀樂未發巳發之間惟不留意於戒愼恐懼故曰自驅而入於罟獲陷阱嗜欲貪鄙之中而不自知惟不留意於喜怒哀樂未發巳發之間故雖中庸之理潛見而不能期月守也使移詮品是非之心於戒愼恐懼其知孰大焉使移機巧術數之心於喜怒哀樂未發已發之間其知又孰大焉此篇直指學者用知處故舉舜所以為大知之事在前而又立此説於後其左右表裏發明中庸之學也切矣學者當審之子曰回之為人也擇乎中庸得一善則拳拳服膺而弗失之矣人皆知機巧術數之為知而不知擇乎中庸守以期月之為知惟顔子則進乎此矣此孔子所以稱之於守以期月之後也夫喜怒哀樂巳發未發之間所謂中庸也差之毫釐繆以千里其可不精擇之哉顔子戒愼恐懼超然悟未發已發之機或於喜處或於怒處至於哀處樂處一得天命之性所謂善者則深入其中人欲都亡我心皆喪人第見其拳拳服膺而弗失耳而不知顔子與天理為一無一毫私欲橫乎其間而不識不知我真無有矣而况人欲乎此中庸之妙也舜發於好問好察邇言隱惡揚善之間而顔子深居乎服􅈾拳拳之內蓋所以表裏之也非深造自得誰能識之子曰天下國家可均也爵祿可辭也白刃可蹈也中庸不可能也均天下國家辭爵祿蹈白刃感慨或能為之此血氣也用以求中庸難矣中庸不在血氣中惟戒愼不睹恐懼不聞者能得之故曰可均可辭可蹈而不用此以能中庸也有此則是血氣非中庸也嗚呼余觀於易乃知中庸之難守也且均天下國家辭爵祿壯哉其勇也而非所謂大壯易曰雷在天上大壯夫雷在天上其壯為如何哉然而君子體此壯以在心止於非禮勿履而巳是知均天下國家辭爵祿蹈白刃未為壯而守中庸者之為壯也且戒愼不睹恐懼不聞即雷在天上大壯也即非禮勿履也即中庸也即天理也其可以血氣為之乎惟血氣消盡中庸見矣君子不可不察也子路問強子曰南方之強與北方之強與抑而強與寬柔以教不報無道南方之強也君子居之祍金革死而不厭北方之強也而強者居之故君子和而不流強哉矯中立而不倚強哉矯國有道不變塞焉強哉矯國無道至死不變強哉矯子路聞可均可辭可蹈中庸不可能之語以謂中庸之強當如何夫子知子路之所謂強者不過血氣耳中庸之中非血氣所得停留者也故設為三問以斥血氣之強南方之強北方之強與夫子路之強皆血氣也非中庸也然而衽金革死而不厭謂之血氣之強可也寬柔以教不報無道君子居之是亦足矣乃謂之血氣之強何哉蓋強當從戒愼不睹恐懼不聞中來則此強為中庸之強若乃山川風氣使之如此而中無所得焉豈非血氣云乎子路天資好勇其鼓琴也流入北鄙其言志也則曰師旅此北方之強也故曰而強者居之然則何以為中庸之強也曰和而不流此喜怒哀樂之中節也故其強矯然不撓中立而不倚此喜怒哀樂未發時也故其強亦矯然不撓惟戒愼不睹恐懼不聞潛養中和以至如此之強故其見於用也遇有道之丗則此中和不變於厄塞之節故其強矯然不撓遇無道之丗則此中和脅之以死而亦不變其節故其強矯然不撓夫不變者乃不流不倚之發也矯之為言剛毅之貌非矯揉之矯也此一字係重輕學者不可造次夫中庸一以理為主非從戒愼恐懼中來安得如此之妙乎其與血氣之強相逺矣子路聞之得不悼其平時之無益而潛養之不可巳乎學者不欲遇天下之變則巳如欲遇天下之變其於中庸豈可不留意乎子曰素隱行怪後丗有述焉吾弗為之矣君子遵道而行半塗而廢吾弗能巳矣君子依乎中庸遁丗不見知而不悔惟聖者能之中庸之為德不可作也亦不可止也戒愼不睹恐懼不聞謂之作而非作謂之止而非止所以能養中庸也素隱謂終身行乎隱晦中庸在隱晦則隱晦而巳矣安可作也儻微有作意至行怪以釣名則非中庸也此聖人所以不為焉遵道而行謂率性也中庸在率性則率性而巳矣安可止焉儻有止意至半塗而不進則非中庸也此聖人所以不巳焉欲識中庸要處請於弗為弗巳而味之弗為弗己即戒愼恐懼也彼其半塗而廢君子則依乎中庸依則弗巳之謂彼其素隱而行怪君子則遁丗不見知而不悔不悔則弗為之謂夫所以能不悔者中庸之力也故曰惟聖者能之余嘗求聖人而不可得今乃知止在喜怒哀樂未發處耳豈不近乎子思明示天下人以入路且曰戒愼不睹恐懼不聞聖人門庭蕩蕩明白如此吾儕何為而不舉鞭乎學者冝愼思之君子之道費而隱夫婦之愚可以與知焉及其至也雖聖人亦有所不知焉夫婦之不肖可以能行焉及其至也雖聖人亦有所不能焉君子之道即中庸也中庸不離喜怒哀樂未發巳發之間此日用所不免者也豈非費乎費當為費用之費雖夫婦之愚不肖豈有無喜怒哀樂者乎此所謂可以與知可以能行者也然而由戒愼不睹恐懼不聞以養喜怒哀樂使為中為和以位天地育萬物雖聖人猶皇皇汲汲自謂有所不知有所不能焉豈非隱乎蓋自以為知自以為能則止矣止非中庸也惟若有所不知有所不能則戒愼恐懼其敢一日而巳乎此理微矣力行者能識之非口舌所能辨也中庸説卷第一

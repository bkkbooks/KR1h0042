front:
  text: 中庸說卷第三
  hash: sha256:fde3a6a9c6989a59007d8e81172a40b629dc7211997f79c28663b01084e530c4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0042_SBCK_003-1a}
body:
  text: 中庸子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之戒愼不睹恐懼不聞則無適而不在中和中和則無憂也必矣古之人有享斯效者其惟文王乎夫中和之中自當有賢父聖子文王其見之矣以王季為父是父所作者中和也以武王為子是子所述者中和也文王處賢父聖子之間夫何憂哉中和之見於人者即文王可知矣然則舜以瞽䀻為父以商均為子則中和將何處乎曰中和之見於人當如文王之無憂至於大舜父子斯天倫之不幸也不幸豈可以為常乎學者當知此意中和之道無所疑矣此不可不辨明焉武王纘太王王季文王之緒一戎衣而有天下身不失天下之顯名尊為天子冨有四海之內宗廟饗之子孫保之武王纘太王王季文王之緒緒即中和也天命巳逼民心久遏乃一戎商而有天下嗚呼豈得巳哉戎商冝若非中和也是何言歟子思不曰喜怒哀樂未發謂之中發而皆中節謂之和乎武王一怒而安天下此怒之中節也此中和也此太王王季文王之緒也然而武王之舉危道也聖人之不幸者也其曰不失天下之顯名與必得之言相並則知武王之舉危道也聖人之不幸也然而又不失尊為天子冨有四海之內宗廟饗之子孫保之者則以出於中和故其理當如是也武王末受命周公成文武之德追王太王王季上祀先公以天子之禮斯禮也逹乎諸侯大夫及士庶人父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也夫武王之中和豈止行之於克殷一事而已哉又於追王之事見之夫追王乃中和所當然也周公承文王武王之中和以行追王太王王季之禮與夫推追王之心以行上祀先公以天子之禮又推追王之禮以下逹乎諸侯大夫及士庶人如父為士子為大夫葬以士祭以大夫是也夫士而受大夫之祭此追王之意下逹於大夫也使父為庶人子為大夫亦將葬以庶人祭以大夫矣此深察人子之心以致意於其先也審如是父為大夫子為士葬以大夫祭以士抑吾貶吾親就士之禮耶追王之意安在哉曰事各有稱葬以大夫是喪從死者之義祭以士是祭從生者之義以己之祿祭其先人此意與追王之心一等也惟深思者見之儻以丗俗之心以榮辱吾親非中和之道也至於期之喪逹乎大夫三年之喪逹乎天子父母之喪無貴賤一也皆喜怒哀樂已發之中節者也此天理之自然者不可加損焉惟事事隱之於心如追王如祭以天子如逹乎諸侯逹乎大夫逹乎天子無貴賤一也皆輕重中節天理自然無一毫私意偏倚於其間中和之形見於作用者如此不可不致精以求之也至於論名數之意吕與叔辨之甚詳此不復叙子曰武王周公其逹孝矣乎夫孝者善繼人之志善述人之事者也春秋修其祖廟陳其宗器設其裳衣薦其時食宗廟之禮所以序昭穆也序爵所以辨貴賤也序事所以辨賢也旅酬下為上所以逮賤也燕毛所以序齒也踐其位行其禮奏其樂敬其所尊愛其所親事死如事生事亡如事存孝之至也祖廟宗器裳衣時食昭穆貴賤辨賢逮賤序齒踐位行禮奏樂敬尊愛親事死事亡雖施設隱顯未詳然皆文王中和之所發見寓於心志事為之間者如此此文王之志文王之事也繼志述事者無他第於戒愼不睹恐懼不聞處致其察以養中和之理然後深見文王之所為一一皆天理中發見者隨時損益而不忘其中和之大此文王之志文王之事所以望於武王周公者而武王周公所以為逹者亦正以是也此所以反覆具載於此篇則以中庸之德當如是也若夫名數之學精微之義則吕與叔龜山先生辨之甚詳此不復叙郊社之禮所以事上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如示諸掌乎郊社之禮宗廟之禮皆自中和中出豈私智所為哉夫郊社之禮禘嘗之義此先王深知天神地示人鬼之心而即國外之郊以祀天國中之社以祭地禘嘗之禮以享鬼神不知先王居於何地知天神自郊求地示自社求人鬼自禘嘗求哉夫其數可陳也其義難知也明乎郊社之禮禘嘗之義治天下國家直推此而為之耳然而禮義徑自何而明哉惟戒愼不睹恐懼不聞以養中和則天神地示人鬼之心皆見於此矣且天地位於此万物育於此治國豈能出此理哉是以君子愼其獨也哀公問政子曰文武之政布在方䇿其人存則其政舉其人亡則其政息人道敏政地道敏樹夫政也者蒲盧也文武之政即中和也布在方䇿書此中和也有中和之君子則見文武之心故其政舉無中和之人雖如方䇿所言一一行之若王莽傳中所載井田賦祿之政無不依三代制作然篡逆之臣豈嘗夢見中和是以一切顚倒天下大亂適以資笑具而巳則其政息復何疑哉夫使人誠得中和之道則不疾而速不行而至嚬笑之間天下巳丕變矣人道敏政猶之地道焉布種下實未及頃刻日夜之息一經雨露之潤則勃然而生為萌為芽為幹為枝為葉以至為華為實向來荒虛之地一旦青葱秀潤可攬可掬矣以地道敏樹觀之則人道敏政可見也蓋地道亦巳得中和故也然政之變化何止如地道哉繫乎其人如何耳堯舜率天下以仁則人人如堯舜而比屋可封桀紂率天下以暴則人人如桀紂而比屋可誅真如蒲盧取螟蛉祝之曰類我類我久則皆似之矣使以中和布之於政發起天下之中和則江漢之女無思犯禮兔置之人莫不好德人人有士君子之行不難到也此所以載此章於中庸焉故為政在人取人以身修身以道修道以仁仁者人也親親為大義者冝也尊賢為大親親之殺尊賢之等禮所生也在下位不獲乎上民不可得而治矣政如蒲盧蒲盧祝螟蛉則螟蛉變為蒲盧矣為政豈不在中和之人乎有中和之人則有中和之政取中和之人則當以身為則身中和則取人亦中和矣然則何以致身之中和哉戒愼不睹恐懼不聞以率性可也率性之謂道故修身以道即中和見矣然仁者人也親親為大義者冝也尊賢為大親親之殺尊賢之等隆殺等降有品節焉一出於仁義而巳矣仁人心也義人路也義自仁中出路自心中來則所謂義又出於仁也惟仁有品節焉此修道以仁也仁者人也義者冝也其意安在曰非矜私意非行小慧坦然與天下同其功者此仁也而其用莫大於親親不髙以絶物不卑以纍己適然得萬事之理者此義也而其用莫大於尊賢親有上下故有隆殺賢有小大故有等級隆殺等級禮自此而生矣此所謂教也修道之謂教其是之謂歟然則中和之理何在而不然哉故君子不可以不修身思修身不可以不事親思事親不可以不知人思知人不可以不知天夫欲行文武之政不可以無人而取人當以身故身不可以不修修身以何為則以事親為則事親以何為則以知人為則知人以何為則以知天為則何謂天喜怒哀樂未發以前天也戒愼不睹恐懼不聞於不睹不聞處深致其察所以知天也推知天之心以知人則人之幽隱深微無不察矣故賢不肖洞然不可亂推知人之心以事親則親之幽隱深微無不察矣故能先意承志先事幾諫而事親得其道也事親得其道則修身之效也修身既效則以此中和識天下之中和矣故能取天下中和之人以行文武中和之政然則子思首之以天命之謂性意乃在此其言豈不深密乎學者其可以易而觀之哉天下之逹道五所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之逹道也知仁勇三者天下之逹德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也和也者天下之逹道也是君臣父子夫婦昆弟朋友之交皆和之所發見也故謂之逹道智知此理而行仁覺此理而行勇决此理而行君臣父子夫婦昆弟朋友之交天下之所同故謂之逹道知仁勇一己所自得故謂之逹德所以行君臣父子五者在知仁勇所以行知仁勇者在誠一者誠也誠即喜怒哀樂未發以前是也夫是誠也或生而知之若堯舜是或學而知之若湯武是或困而知之若太甲是所以知之者何物哉誠也知之耳吾未能有行焉是未能運用此誠也然有安而行之者亦若堯舜是有利而行之者亦若湯武是有勉強而行之者亦若太甲是夫行之者其何物哉亦誠也是行逹道者知仁勇行知仁勇者誠知誠者誠行誠者誠夫誠一耳何為行知仁勇者誠而又知誠者誠行誠者亦誠哉此蓋有說也其說安在曰行知仁勇者誠也以謂誠如是盡矣而所以知此誠者其誰乎即誠也知之耳未及行也所以行此誠者其誰乎即誠也此聖人極誠之所在而指之也行知仁勇者誠知誠者將以為它物耳又是誠耳知未及行行誠者又將以為它物耳又是誠耳誠字雖同而行知仁勇之誠不若知誠之誠為甚明知誠之誠又不若行誠之誠為甚大也嗚呼誠之為物如此其可以淺易窺之哉此於穆不巳天之所以為天純亦不已文王之所以為文王也其深矣哉子曰好學近乎知力行近乎仁知恥近乎勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則知所以治天下國家矣行逹道者知仁勇知仁勇自何而入哉此聖人所以又指以入知仁勇之路也夫好學必有所見而然也故謂之知力行必以不能自巳而然也故謂之仁知恥必斷然不為也故謂之勇然而不直指好學為知力行為仁知耻為勇而曰近者何也近之為言以言不逺也不逺即在此而巳矣第知所以好學者誰所以力行者誰所以知耻者誰則為知為仁為勇矣夫見於言語文字者皆近之而巳矣唯人體之識所以體之者為誰當幾而明即事而解則知仁勇豈他物哉知斯三者則直趨知仁勇之路身豈有不修哉知所以修身則於天下之人皆當開導之使自趨知仁勇之路知仁勇天下所同有也故知所以修身則知所以治人知治人之路不出乎知仁勇則周旋四顧其所以治天下國家亦不出乎知仁勇之路而巳嗚呼豈不簡易明白乎夫所謂學所謂行所謂恥何也即戒愼不睹恐懼不聞之謂學者不於此入則泛然如萍之在水逢風南北有何所寄泊乎此君子所以愼其獨也凡為天下國家有九經曰修身也尊賢也親親也敬大臣也體群臣也子庶民也來百工也柔逺人也懷諸侯也夫知知仁勇則知所以修身推而極之以至於治天下國家其為天下國家也則散而為九經九經則知仁勇之用也夫時當孟春則不期而魚上冰獺祭魚鴻鴈來矣時當孟夏則不期而螻蟈鳴蚯蚓出王瓜生苦菜秀矣豈孟春孟夏區區號令於魚獺鴻鴈螻蟈蚯蚓王瓜苦菜哉一氣之行其法當如是耳審乎此使不知知仁勇則巳如其知知仁勇發於為天下國家則亦不期修身尊賢親親敬大臣體群臣子庶民來百工柔逺人懷諸侯矣使一事不備必知仁勇未盡其道也誠使知仁勇皆盡其道則此九經以次而行不先不後不遲不速皆中其㑹矣此天理之自然非私智所能為也嗚呼從戒愼不睹恐懼不聞發為知仁勇其極施於天下國家如此然則中庸之為德其至矣乎之言一一見矣豈欺我哉然而知知仁勇三者則知所以修身以至知所以治天下國家今為天下國家又先曰修身夫前言修身則能治天下國家今為天下國家又曰修身何也曰中庸之道無止法也此又於穆不已純亦不已之意唯力學者乃能識之修身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體群臣則士之報禮重子庶民則百姓勸來百工則財用足柔逺人則四方歸之懷諸侯則天下畏之夫自中和之理發於君臣父子昆弟夫婦朋友之間變其名為知仁勇又變其名為一又變其所以逹道者為九經皆中和之作用無往而不中節也夫惟中節故以之修身則道立以之尊賢則不惑以之親親則諸父昆弟不怨以之敬大臣則不眩以之體群臣則士之報禮重體若四牡之詩所謂有功而見知則說是也知謂體悉之也以之子庶民則百姓勸以之來百工則財用足以之柔逺人則四方歸之以之懷諸侯則天下畏之夫所以立所以不惑不怨不眩所以報禮重所以勸所以足所以歸所以畏是乃中和之中節故其效自爾也使吾修身而道未立吾親親而怨以至吾懷諸侯而不畏是吾於中和未至其極也且致中和則天地位於此萬物育於此九經其有不效乎此君子所以愼其獨也中庸說卷第三

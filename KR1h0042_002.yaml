front:
  text: 中庸説卷第二
  hash: sha256:a034171d27863c5275e8ad08dd85efe49b0a8b61336a5706e3c98d058711a6e1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1h0042_SBCK_002-1a}
body:
  text: 中庸天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉此中庸之所以為大也夫天地雖大而不免有日月薄蝕彗孛飛流山川震動草木倒植寒暑失中雨暘差序水旱相繼札瘥流行此人所以不免有憾也然則財成其道輔相其冝彌綸範圍真有待於中庸耳豈如中庸之君子語其大則天地位焉萬物育焉人豈有憾乎此天下所以莫能載也語其小則跋行喙息蠉飛蠢動皆待之以順適此天下所以莫能破也夫中庸之道贊天地之化育如此而其要止在喜怒哀樂未發巳發之間而巳而其所以入之之路又止在戒愼不睹恐懼不聞而巳學者胡為不少致思乎詩云鳶飛戾天魚躍于淵言其上下察也君子之道造端乎夫婦及其至也察乎天地夫君子之道所以大莫能載小莫能破以其戒愼不睹恐懼不聞察於微茫之功也戒愼恐懼則於未形之先未萌之始巳致其察矣察之之至至於鳶飛魚躍而察乃在焉夫能亂人之德而居人倫之先者夫婦是也欲識不睹不聞之實當於夫婦而察之故君子之察必造端乎夫婦使夫婦之道正則天地之道皆正矣其要如此安可不察耶察之如何非心一形邪意一作無不見其所自起知其所由來戒愼恐懼而不敢肆焉察之既熟豈特夫婦間哉則凡象生於見形起於微上際下蟠察無不在所以如鳶之飛于天如魚之躍于淵察乃隨飛躍而見焉而况日月星辰之運動山川草木之流峙乎顧惟此察始於戒愼恐懼而巳戒愼恐懼以養中和而喜怒哀樂巳發未發之間乃起而為中和大含元氣而天下莫能載小入無間而天下莫能破察之之功如此君子於愼獨之學其可忽耶子曰道不逺人人之為道而逺人不可以為道詩云伐柯伐柯其則不逺執柯以伐柯睨而視之猶以為逺率性之謂道道豈逺人哉人具有此性又安可舍已之性而求道哉性外無道道外無性舍人之性而欲求道猶適越而北向趨燕而南奔雖駕駿馬乘輕車卒歲窮年殆見其無所得耳夫執柯以伐柯可謂近矣然而猶以為逺者以性較之也若人之性當幾即是因體即明非兩物也伐柯而視柯猶是兩物也柯外有柯豈非逺乎若乃人即為道不待它求其與伐柯異矣聖人明辨細微至於如此學者率性其可不致精乎故君子以人治人改而止忠恕違道不逺施諸已而不願亦勿施於人人即性也君子既率性而得道天下之人有不由乎道者以迷其性也君子則以我之性覺彼之性其寓之簠簋爼豆制度文章以至鍾鼓管磬竽笙環珮元酒大羮􅌊蕭鬱鬯之間者無非覺其性也使其由此以見性則自然由乎中庸之道而向來無物之言不常之行皆掃不見迹矣夫君子所以區區如此者止欲其率性由道而巳既巳率性由道復有何事哉故得其改則止矣此忠恕之道也夫恕由忠而生忠所以責己也知己之難克然後知天下之未見性者不可深罪也故人有平生為惡使一見性本不蹈前轍則君子止矣不復更責矣豈非忠恕乎忠恕去道如此之近者以施諸已而不願亦勿施於人而巳且吾巳改過而率性使人之責己尚不巳吾意豈不以其為太甚乎中庸道中無太甚也由是可以知聖人之存心君子之道四丘未能一焉所求乎子以事父未能也所求乎臣以事君未能也所求乎弟以事兄未能也所求乎朋友先施之未能也君子由戒愼不睹恐懼不聞深致其察故其形於外也如大舜之好問而好察邇言隱惡而楊善如顔子之擇乎中庸得一善則拳拳服膺而弗失如詩人之察鳶飛魚躍如君子之察乎天地故自不睹不聞處察之以至於丗間人情無所不致其察先察知一己之難克而後察見天下皆為可恕之人不敢妄責備焉每事先求乎已之所能行者然後推之以善天下凡施諸己而不願者亦不敢以施諸人而已之所願者則推而行之與天下同其樂此所以為中庸之道而深原其功乃自於戒愼恐懼以致其察之功也明乎此説則君子之道四如子事父臣事君弟事兄朋友先施之皆曰求者蓋所以致其察也人倫之大而致其察則天下之理無遺餘矣察子之事父吾未能安敢責父之愛子乎察臣之事君吾未能安敢責君之禮臣乎察弟之事兄吾未能安敢責兄之友弟乎察朋友先施之吾未能安敢責朋友之必信乎此忠恕之道也夫自以為能則止矣故終身不能自以謂未能則皇皇汲汲其敢巳耶如前言聖人有不知有不能而此言未能此意深矣學者不可忽也夫聖人常處於不知不能未能之地以見其皇皇汲汲無敢巳焉之意此所以無所不知無所不能且於穆不巳天之所以為天純亦不巳文王之所以為文王使聖人於君子之道四自以為能則巳矣其責備於天下豈不深乎巳非天之理也如韓愈作羑里操曰臣罪當誅兮天王聖明此深見文王之心臣以事君未能之意舜祗載見瞽瞍負罪引慝此亦子之事父未能之意儻文王以為能則懟君舜以為能則怨父中庸之道於此二事可見矣非於不睹不聞處深致其察又烏能推之人倫若是其微哉是故君子愼其獨也庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾自戒愼恐懼事致其察其發見於忠恕是故其為行也則為庸德之行其為言也則為庸言之謹庸者非不足亦非有餘適當其可者是也夫惟戒愼恐懼則不足者不敢不勉以至於此有餘者不敢盡發以過於此所謂中庸也戒愼恐懼則常致其察是故當其言也則於言察其行當其行也則於行察其言顧者察也夫中庸之道如此君子胡不戒愼恐懼事致其察以慥慥於此地乎慥慥者不巳之謂也君子素其位而行不願乎其外素冨貴行乎冨貴素貧賤行乎貧賤素夷狄行乎夷狄素患難行乎患難君子無入而不自得焉忠恕之道其至矣乎盡其在我而不責於人素其位而行盡其在我也不責備於人不願乎其外也涵泳乎忠恕之中郁如三春薰如醇酎何所往而不可乎素猶雅素之素舜之若將終身者是也使終身冨貴則以忠恕之道行乎冨貴若堯是也終身貧賤則以忠恕之道行乎貧賤若顔子是也素夷狄則以忠恕之道行乎夷狄若箕子是也素患難則以忠恕之道行乎患難若孔子是也冨貴貧賤夷狄患難皆天之所以命我者吾其如之何哉姑聽之而巳矣然吾有忠恕之道無入而不自得故盡其在我不責備於人是以戒愼恐懼不敢使一毫私意介乎其心而寬夷平易優遊怡愈衎衎如也融融如也自得之道概在乎此嗚呼忠恕其至矣乎在上位不陵下在下位不援上正己而不求於人則無怨上不怨天下不尤人故君子居易以俟命小人行險以僥幸子曰射有似乎君子失諸正鵠反求諸其身此言君子自戒愼不睹恐懼不聞醖釀成中庸之道處上下天人之間無所不用其忠恕也其在上也以忠恕待人故不陵下其在下也以忠恕自處故不援上援者欲己與之齊也夫為上所陵為下所援而不以忠恕處其間則不能無怨憾矣君子力行忠恕之道正己而不求於人故處陵忽干援之中其心泰然無絲毫之怨以至身行於貧賤憂患禍難喪失不可堪處之間一皆以忠恕為樂若將終身于此而不動焉夫何怨天尤人之有此無他君子居忠恕以應天命而巳易者忠恕之謂若夫小人則不能安於忠恕至於喪名失節以求合于上卒不免於患難徒使身名兩失而已此行險以徼幸者也其所以如此者以其平時不知愼獨之學不留意於戒愼不睹恐懼不聞以養中庸之道而察忠恕一貫之理耳射有正鵠賔射之侯則謂之正大射之俟則謂之鵠使吾內志正外體直持弓矢審固則賔射必不出正大射必棲於鵠此必然之理也使在我有杪忽之差則在彼有尋丈之失矣然則失諸正鵠豈正鵠之罪哉吾內志不正外體不直以至持弓矢不審固之罪也猶之為上所陵為下所援不得處冨貴安平而每遇貧賤憂患禍難喪失若天所不祐人所不歸者豈上下天人之罪哉皆吾戒愼恐懼不至而中和之理不發見不足以感發天下之幾也使誠中和天地且位於此萬物且育於此况上下天人之間乎誠知此理方且戒愼恐懼正已之不給又何暇責備於人乎此所以為中庸也君子之道譬如行逺必自邇譬如登髙必自卑詩曰妻子好合如鼓瑟琴兄弟既翕和樂且耽冝爾室家樂爾妻孥子曰父母其順矣乎此言君子推忠恕之效也夫欲知戒愼不睹恐懼不聞之效當於忠恕卜之欲知忠恕之效當於父母卜之使父母順適則忠恕之效著矣故有登髙行逺之譬夫行逺必自邇登髙必自卑妻子兄弟邇也卑也欲父母順適必自妻子合兄弟和始豈非父母髙逺而妻子兄弟卑近乎使妻子好合如鼓瑟琴推之於兄弟則兄弟既翕和樂且耽矣夫人為人冝於室家樂於妻拏想其為人曲盡在我之理深識人情之微莊肅恭謹寬夷平易以此心事父母父母其有不順乎使其不知戒愼恐懼之理待己甚輕責人甚重則於妻子必不合於兄弟必不和一家之內妻子兄弟如此父母豈得順適乎此不孝之子也夫在妻子為合在兄弟為和在父母為順此一理也今於妻子兄弟父母如此原其所以以不知忠恕之理也不知忠恕之理以不知戒愼不睹恐懼不聞之理也是以君子於愼獨之學不可須臾離子曰鬼神之為德其盛矣乎視之而弗見聽之而弗聞體物而不可遺使天下之人齊明盛服以承祭祀洋洋乎如在其上如在其左右詩曰神之格思不可度思矧可射思夫微之顯誠之不可掩如此夫鬼神在明則為中庸中庸在幽則為鬼神其實一也明則有禮樂幽則有鬼神是也夫中庸之要處在戒愼不睹恐懼不聞而喜怒哀樂森列于中不可欺者此鬼神之德也是以鬼神之德雖曰視之而弗見聽之而弗聞然天地萬物森然鬼神列于中不可遺也惟鬼神之德如此故足以發天下之敬使皆戒愼不睹恐懼不聞而齊戒以肅其身明潔以敬其心盛服以嚴其貌洋洋乎如在其上在其左右豈敢有一毫私意哉此正養中庸之幾也故引神之格思不可度思矧可射思為證夫有度有射皆私意耳非戒愼恐懼其可以享鬼神乎夫鬼神弗見聞而使人聳然不敢起非心邪意儼然如在者則以中庸之道發於幽者不得不爾嗚呼微之顯誠之不可掩其狀乃如此君子之於愼獨其可忽乎子曰舜其大孝也歟德為聖人尊為天子冨有四海之內宗廟饗之子孫保之故大德必得其位必得其祿必得其名必得其壽故天之生物必因其材而篤焉故栽者培之傾者覆之詩曰嘉樂君子憲憲令德冝民冝人受祿于天保佑命之自天申之故大德者必受命夫戒愼不睹恐懼不聞其見於舜也內則以養中和外則發之於好問好察邇言隱惡而揚善與夫大孝之德夫所以好問所以好察所以隱惡所以揚善所以為大孝皆戒愼恐懼之形見也此所謂誠諸中形諸外有不可得而巳者夫舜負罪引慝祗載見瞽瞍夔夔齊栗非戒愼恐懼之形見乎此所以為大孝也且應龍之翔則雲霧滃然而起震風薄怒則萬空不約而號使自戒愼恐懼發而為大孝以德則為聖人以尊則為天子以冨則有四海之內而宗廟饗之子孫保之者此必致之理也夫何故以大德必得其位必得其祿必得其名必得其夀猶石韞美玉則一山為之蔥青水懷明珠則一川為之秀潤天理如此何足怪哉蓋天之生萬物初無容心也因其材而成之耳如鸞凰為瑞物自取尊榮鴟梟為妖祥自取彈射楩楠自取棟梁蒲柳自取薪爨天亦因其材而成之耳豈能有所損益哉栽者本根深固自取培益傾者本根搖動自取顚覆亦豈有心哉是以知大德者自取位祿名壽而無德者自取貧賤刑戮也是位祿名壽乃大德之形見也不如是是吾德之未至也故引嘉樂之詩為證而斷之曰大德必受命其言判別不疑此所以勉天下之為德者當始於戒愼恐懼而以位祿名壽以卜德之進否也丗之論者曰孔子大聖人而名位祿不著顔子大賢而壽亦不聞斯言欺我哉曰學者讀書當識立言之體方論大德受命之理此天下之正理也安得以孔顔為説至於孔顔可謂天理顚倒事之不幸者也豈可以為常談哉然而孔顔之位祿名壽亦豈可誣也雖不得志於當時而萬丗之後天子師事巍然南面尊主大國合天下而拜之大德者必受命亦可知矣君子第當論大孝大德如何至於位祿名壽至與不至盍亦日日新又日新以警省其所未至乎上以大舜當年為則下以孔顔後丗為準豈不韙哉中庸説卷第二
